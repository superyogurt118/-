<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакеатэ Мовын</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo-container" onclick="showSection('home')">
            <img src="logo.png" alt="logo" class="logo-img">
            <span class="logo-text">Вакеатэ Мовын</span>
        </div>
        <div class="menu-toggle" onclick="document.getElementById('nav-list').classList.toggle('show')">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-links" id="nav-list">
            <li><a onclick="showSection('home')">Главная</a></li>
            <li><a onclick="showSection('alphabet')">Алфавит</a></li>
            <li><a onclick="showSection('grammar')">Грамматика</a></li>
            <li><a onclick="showSection('vocab')">Словарь</a></li>
        </ul>
    </nav>
</header>

<main>
    <section id="home" class="content-section active">
        <h1 id="h-title">Вакеатэ Мовын</h1>
        <p id="h-desc" style="text-align: center; font-size: 1.4rem; color: #666;">Загрузка знаний...</p>
    </section>

    <section id="alphabet" class="content-section">
        <h2>Алфавит</h2>
        <div class="grid" id="alpha-grid"></div>
    </section>

    <section id="grammar" class="content-section">
        <h2>Грамматика</h2>
        <div id="gram-list"></div>
    </section>

    <section id="vocab" class="content-section">
        <h2>Словарь</h2>
        <div id="vocab-list"></div>
    </section>
</main>

<script>
    // ТВОЯ ССЫЛКА НА JSON
    const DATA_URL = ''; 

    async function fetchData() {
        if (!DATA_URL) {
            document.getElementById('h-desc').innerText = "Пожалуйста, укажите ссылку на data.json в коде.";
            return;
        }
        try {
            const response = await fetch(DATA_URL);
            const data = await response.json();
            render(data);
        } catch (e) {
            document.getElementById('h-title').innerText = "Ошибка";
        }
    }

    function render(data) {
        document.getElementById('h-title').innerText = "Вакеатэ Мовын";
        document.getElementById('h-desc').innerText = "Уникальный лингвистический проект на базе русского языка.";

        document.getElementById('alpha-grid').innerHTML = data.alphabet.map(l => `<div class="card">${l}</div>`).join('');
        
        document.getElementById('gram-list').innerHTML = data.grammar.map(r => `
            <div class="list-item"><h3>${r.title}</h3><p>${r.text}</p></div>
        `).join('');

        document.getElementById('vocab-list').innerHTML = data.dictionary.map(v => `
            <div class="list-item"><b>${v.word}</b> — ${v.translation}</div>
        `).join('');
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    fetchData();
</script>

</body>
</html>
