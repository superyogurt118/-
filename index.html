<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>язык · чисто</title>
    <!-- Строгий шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* Полный сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #fbede2; /* мягкий чистый оранжевый */
            color: #000000; /* абсолютно чёрный шрифт */
            line-height: 1.5;
            min-height: 100vh;
        }

        .app {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* --- Боковое меню (изначально открыто) --- */
        .sidebar {
            width: 260px;
            background-color: #fbede2;  /* оранжевый фон меню */
            padding: 2rem 1.2rem;
            border-right: 1px solid #e0cfc0; /* тонкая граница */
            transition: width 0.2s ease, padding 0.2s ease, opacity 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
        }

        /* Кнопка закрытия меню (крестик) */
        .close-menu {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            background: none;
            border: none;
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            color: #5a4a3d;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            transition: 0.1s;
        }
        .close-menu:hover {
            background-color: #e6d4c4;
            color: #000;
        }

        .sidebar h2 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: #000; /* чёрный */
            border-bottom: 2px solid #dac2b0;
            padding-bottom: 0.6rem;
            padding-right: 2rem; /* чтобы не наезжать на крестик */
        }

        /* Кнопки-вкладки в меню */
        .menu-item {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 400;
            text-align: left;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            transition: 0.1s;
            width: 100%;
            border: 1px solid transparent;
        }
        .menu-item:hover {
            background-color: #eddacb;
        }
        .menu-item.active {
            background-color: #ffffff;  /* белый фон активного пункта */
            font-weight: 600;
            border-color: #cfb7a5;
        }

        /* --- Основная правая часть (белый фон на весь экран справа) --- */
        .main-content {
            flex: 1;
            background-color: #ffffff;  /* чисто белый */
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0; /* чтобы flex не переполнял */
        }

        /* Кнопка открытия меню (гамбургер), скрыта по умолчанию */
        .open-menu {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: #fbede2; /* оранжевая, чтобы была заметна */
            border: 1px solid #ccb7a8;
            font-size: 1.8rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            color: #000;
            z-index: 10;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: none;  /* скрыта, пока меню открыто */
            transition: 0.1s;
        }
        .open-menu:hover {
            background-color: #f0d6c2;
        }

        /* Контейнер для контента (центрирование) */
        .content-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Панели с сообщениями */
        .pane-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .tab-pane {
            display: none;
        }
        .tab-pane.active-pane {
            display: block;
        }

        .placeholder-message {
            font-size: 2rem;
            font-weight: 350;
            color: #a2765a;  /* мягкий оранжево-коричневый для текста заглушки */
            line-height: 1.5;
        }
        .placeholder-message small {
            display: block;
            font-size: 1.2rem;
            color: #937b68;
            font-weight: 350;
            margin-top: 1.2rem;
            border-top: 1px dashed #d4bcac;
            padding-top: 1rem;
        }

        /* --- Состояние: меню скрыто --- */
        .app.sidebar-collapsed .sidebar {
            width: 0;
            padding: 0;
            opacity: 0;
            border-right: none;
        }
        .app.sidebar-collapsed .open-menu {
            display: block;  /* показываем кнопку-гамбургер */
        }
        /* при скрытом меню правая часть занимает всю ширину */
        .app.sidebar-collapsed .main-content {
            width: 100%;
        }

        /* Адаптивность: на узких экранах меню становится сверху, но мы сохраним логику */
        @media (max-width: 650px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0cfc0;
                padding: 1.2rem;
            }
            .close-menu {
                top: 0.8rem;
                right: 1rem;
            }
            .app.sidebar-collapsed .sidebar {
                width: 0;
                padding: 0;
                border-bottom: none;
            }
            .open-menu {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Боковое меню (слева, оранжевое) -->
        <div class="sidebar" id="sidebar">
            <button class="close-menu" id="closeMenuBtn" aria-label="Закрыть меню">✕</button>
            <h2>язык ·</h2>
            <button class="menu-item active" data-tab="about">О языке</button>
            <button class="menu-item" data-tab="alphabet">Алфавит</button>
            <button class="menu-item" data-tab="rules">Правила</button>
            <button class="menu-item" data-tab="exercises">Упражнения</button>
        </div>

        <!-- Основная белая область -->
        <div class="main-content">
            <!-- Кнопка для открытия меню (гамбургер) появляется только когда меню скрыто -->
            <button class="open-menu" id="openMenuBtn">☰</button>

            <div class="content-center">
                <div class="pane-container">
                    <div id="about" class="tab-pane active-pane">
                        <div class="placeholder-message">
                            🌅 ничего нет
                            <small>раздел об языке</small>
                        </div>
                    </div>
                    <div id="alphabet" class="tab-pane">
                        <div class="placeholder-message">
                            🔤 ничего нет
                            <small>алфавит</small>
                        </div>
                    </div>
                    <div id="rules" class="tab-pane">
                        <div class="placeholder-message">
                            📘 ничего нет
                            <small>правила</small>
                        </div>
                    </div>
                    <div id="exercises" class="tab-pane">
                        <div class="placeholder-message">
                            ✏️ ничего нет
                            <small>упражнения</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const app = document.getElementById('app');
            const sidebar = document.getElementById('sidebar');
            const closeBtn = document.getElementById('closeMenuBtn');
            const openBtn = document.getElementById('openMenuBtn');

            const menuItems = document.querySelectorAll('.menu-item');
            const panes = {
                about: document.getElementById('about'),
                alphabet: document.getElementById('alphabet'),
                rules: document.getElementById('rules'),
                exercises: document.getElementById('exercises')
            };

            // --- Управление скрытием/показом меню ---
            closeBtn.addEventListener('click', () => {
                app.classList.add('sidebar-collapsed');
            });

            openBtn.addEventListener('click', () => {
                app.classList.remove('sidebar-collapsed');
            });

            // --- Переключение вкладок ---
            function switchTab(tabId) {
                menuItems.forEach(item => item.classList.remove('active'));
                const activeItem = document.querySelector(`.menu-item[data-tab="${tabId}"]`);
                if (activeItem) activeItem.classList.add('active');

                Object.values(panes).forEach(pane => {
                    if (pane) pane.classList.remove('active-pane');
                });

                if (panes[tabId]) {
                    panes[tabId].classList.add('active-pane');
                }
            }

            menuItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const tabId = item.getAttribute('data-tab');
                    switchTab(tabId);
                });
            });

            // Инициализация: активная панель соответствует active пункту меню
            const initialActive = document.querySelector('.menu-item.active');
            if (initialActive) {
                const initialTab = initialActive.getAttribute('data-tab');
                if (initialTab && panes[initialTab]) {
                    Object.values(panes).forEach(p => p?.classList.remove('active-pane'));
                    panes[initialTab].classList.add('active-pane');
                }
            } else {
                switchTab('about');
            }

            // При очень узком экране можно автоматически скрывать меню?
            // Но оставим на усмотрение пользователя.
        })();
    </script>
</body>
</html>
