<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакеатэ Мовын</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fffdf5;
            --header-bg: #ffffff;
            --text-color: #333;
            --card-bg: #ffffff;
            --card-border: #eeeeee;
            --gold-grad: linear-gradient(135deg, #ffd700 0%, #d4af37 100%);
            --shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --header-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-border: #333333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        body { 
            font-family: 'Montserrat', sans-serif; margin: 0; 
            background: var(--bg-color); color: var(--text-color); 
            line-height: 1.7; font-size: 18px; transition: 0.3s;
        }

        header { 
            background: var(--header-bg); border-bottom: 4px solid #ffd700;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; max-width: 1200px; margin: 0 auto; }
        .logo-text { font-size: 26px; font-weight: 700; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { list-style: none; display: flex; gap: 20px; padding: 0; margin: 0; }
        .nav-links li a { text-decoration: none; color: var(--text-color); font-weight: 700; cursor: pointer; }

        #theme-btn {
            background: var(--gold-grad); border: none; color: #fff;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .content-section { display: none; padding: 40px 5%; max-width: 1000px; margin: 0 auto; }
        .content-section.active { display: block; animation: fadeInUp 0.4s ease; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Карточки Алфавита */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .card { 
            background: var(--card-bg); border: 2px solid var(--card-border); 
            padding: 25px 10px; text-align: center; border-radius: 15px; 
            font-size: 1.6rem; font-weight: 700; transition: 0.2s; 
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .card:active { border-color: #ffd700; transform: scale(0.95); box-shadow: var(--shadow); }

        /* Всплывающая подсказка */
        #speech-bubble {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: var(--gold-grad); color: white; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; z-index: 2000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); display: none;
        }

        .list-item { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid #d4af37; box-shadow: var(--shadow); }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

<div id="speech-bubble"></div>

<header>
    <nav>
        <div class="logo-text" onclick="showSection('home')">Вакеатэ Мовын</div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a onclick="showSection('alphabet')">Алфавит</a></li>
                <li><a onclick="showSection('grammar')">Грамматика</a></li>
                <li><a onclick="showSection('vocab')">Словарь</a></li>
            </ul>
            <button id="theme-btn" onclick="cycleTheme()">Тема: Авто</button>
        </div>
    </nav>
</header>

<main>
    <section id="home" class="content-section active">
        <h1 style="text-align: center; font-size: 3.5rem; margin-top: 0;">Вакеатэ Мовын</h1>
        <p style="text-align: center; font-size: 1.3rem;">Интерактивный путеводитель по языку. <br><b>Нажми и удерживай букву</b>, чтобы узнать её чтение.</p>
    </section>

    <section id="alphabet" class="content-section">
        <h2>Алфавит</h2>
        <div class="grid" id="alpha-grid"></div>
    </section>

    <section id="grammar" class="content-section"><h2>Грамматика</h2><div id="gram-list"></div></section>
    <section id="vocab" class="content-section"><h2>Словарь</h2><div id="vocab-list"></div></section>
</main>

<script>
    // --- ССЫЛКА НА ТВОЙ ФАЙЛ ---
    const DATA_URL = 'https://raw.githubusercontent.com/superyogurt118/Amyoba/refs/heads/main/data.json'; 

    // --- ФОНЕТИЧЕСКИЕ ПРАВИЛА ---
    const RULES = {
        'Ӵ': 'Читается как [ч]',
        'Ӝ': 'Читается как [жь]',
        'Ӟ': 'Читается как [зь]',
        'Ч': 'Читается как [тш]',
        'ӥ': 'Читается как [йи]',
        'ӧ': 'Читается как [оу]',
        'Ѣ': 'Читается как [ых]'
    };

    // --- ЛОГИКА ТЕМ ---
    let themeIdx = 0; // 0: auto, 1: light, 2: dark
    const themes = ['auto', 'light', 'dark'];

    function cycleTheme() {
        themeIdx = (themeIdx + 1) % 3;
        const current = themes[themeIdx];
        const btn = document.getElementById('theme-btn');
        
        if (current === 'auto') {
            const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
            btn.innerText = "Тема: Авто";
        } else {
            document.body.setAttribute('data-theme', current);
            btn.innerText = current === 'dark' ? "Тема: Тёмная" : "Тема: Светлая";
        }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ДАННЫХ ---
    async function loadData() {
        // Установка начальной темы
        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');

        if (!DATA_URL) return;

        try {
            const response = await fetch(DATA_URL);
            const data = await response.json();
            
            const grid = document.getElementById('alpha-grid');
            grid.innerHTML = data.alphabet.map(l => {
                // Извлекаем чистую букву для поиска правила (убираем "А а" -> оставляем "А")
                let char = l.split(' ')[0];
                return `<div class="card" 
                    onmousedown="showTip('${char}')" 
                    onmouseup="hideTip()" 
                    ontouchstart="showTip('${char}')" 
                    ontouchend="hideTip()">${l}</div>`;
            }).join('');

            document.getElementById('gram-list').innerHTML = data.grammar.map(g => `<div class="list-item"><h3>${g.title}</h3><p>${g.text}</p></div>`).join('');
            document.getElementById('vocab-list').innerHTML = data.dictionary.map(v => `<div class="list-item"><b>${v.word}</b> — ${v.translation}</div>`).join('');
        } catch (e) { console.error("Ошибка загрузки:", e); }
    }

    // --- ПОДСКАЗКИ ---
    function showTip(char) {
        const bubble = document.getElementById('speech-bubble');
        const text = RULES[char] || RULES[char.toUpperCase()] || RULES[char.toLowerCase()] || "Обычное чтение";
        bubble.innerText = text;
        bubble.style.display = 'block';
    }

    function hideTip() {
        document.getElementById('speech-bubble').style.display = 'none';
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    loadData();
</script>
</body>
</html>
