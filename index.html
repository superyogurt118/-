<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакиатэ Мовын</title>
    <style>
        /* Общие стили */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fffdf5;
            color: #333;
        }

        /* Шапка и Навигация */
        header {
            background-color: #fff;
            border-bottom: 3px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Контейнер для логотипа и названия */
        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px; /* Расстояние между картинкой и текстом */
        }

        .logo-img {
            width: 40px;  /* Высота логотипа */
            height: auto;
            display: block;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        /* Кнопка меню (гамбургер) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: #ffd700;
            border-radius: 2px;
        }

        /* Контент */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(180deg, #ffffff 0%, #fff9e6 100%);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .btn-yellow {
            background-color: #ffd700;
            color: #fff;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
        }

        .btn-yellow:hover {
            background-color: #f0c600;
            transform: scale(1.05);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #fff;
                padding: 20px 0;
                text-align: center;
                border-bottom: 2px solid #ffd700;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
            }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#" class="logo-container">
            <img src="logo.png" alt="Логотип" class="logo-img">
            <span class="logo-text">Вакиатэ Мовын</span>
        </a>
        
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="nav-list">
            <li><a href="#">Главная</a></li>
            <li><a href="#">Алфавит</a></li>
            <li><a href="#">Грамматика</a></li>
            <li><a href="#">Словарь</a></li>
            <li><a href="#">Упражнения</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero">
        <h1>Добро пожаловать!</h1>
        <p>Изучайте языки легко в тёплой и светлой атмосфере с Вакиатэ Мовын.</p>
        <br>
        <button class="btn-yellow">Начать обучение</button>
    </section>
</main>

<script>
    const menuToggle = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');

    menuToggle.addEventListener('click', () => {
        navList.classList.toggle('active');
    });
</script>

</body>
</html>
